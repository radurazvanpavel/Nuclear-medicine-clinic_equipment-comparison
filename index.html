<style>
:root{
  --primary:#37008D; --secondary:#7D5DE7; --accent:#2AD1BC;
  --ink:#1D1D29; --line:#E7E3EE; --bg:#FBFAFE; --card:#FFFFFF;
  --neg:#C4452F; --pos:#0E8A73;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Red Hat Text',system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased}
#app{max-width:1080px;margin:0 auto;padding:0 20px 80px;transition:max-width .35s ease}
body.force-mobile #app{max-width:430px}
h1,h2,h3{font-family:'Red Hat Display',sans-serif;color:var(--primary)}

/* top bar */
.topbar{position:sticky;top:0;z-index:50;background:rgba(251,250,254,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:10px 20px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.brand{font-family:'Red Hat Display';font-weight:900;color:var(--primary);font-size:18px;letter-spacing:.02em;display:flex;align-items:center;gap:8px}
.brand img{height:26px;width:auto;display:block}
.gate-card .brand{justify-content:center}
.gate-card .brand img{height:40px}
.brand span{color:var(--accent)}
.controls{display:flex;gap:8px;align-items:center}
.lang-switch{display:flex;border:1.5px solid var(--primary);border-radius:999px;overflow:hidden}
.lang-switch button{border:none;background:transparent;color:var(--primary);font-family:'Red Hat Text';font-weight:700;font-size:12px;padding:6px 12px;cursor:pointer;transition:.2s}
.lang-switch button.active{background:var(--primary);color:#fff}
#viewToggle{border:1.5px solid var(--primary);background:transparent;color:var(--primary);border-radius:999px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Red Hat Text';display:none}
#viewToggle.on{background:var(--accent);border-color:var(--accent);color:var(--ink)}
@media(min-width:700px){#viewToggle{display:inline-block}}

/* tabs */
.tabbar{position:sticky;top:53px;z-index:40;display:flex;gap:6px;overflow-x:auto;padding:12px 0;background:var(--bg);border-bottom:1px solid var(--line);scrollbar-width:none;-webkit-overflow-scrolling:touch}
.tabbar::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;border:1.5px solid var(--line);background:var(--card);border-radius:999px;padding:8px 16px;font-family:'Red Hat Text';font-weight:700;font-size:13px;color:var(--ink);cursor:pointer;white-space:nowrap;transition:.2s}
.tab:hover{border-color:var(--secondary)}
.tab.active{background:var(--primary);border-color:var(--primary);color:#fff}
.tab-panel{display:none}
.tab-panel.active{display:block;animation:fadein .25s ease}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@media(prefers-reduced-motion:reduce){.tab-panel.active{animation:none}}

/* hero */
.hero{padding:36px 0 28px;border-bottom:3px solid var(--primary);position:relative}
.hero .hero-logo{position:absolute;top:36px;right:0;height:52px;width:auto;opacity:.95}
body.narrow .hero .hero-logo{display:none}
.eyebrow{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--secondary);border:1px solid var(--secondary);border-radius:999px;padding:4px 12px;margin-bottom:18px}
.hero h1{font-size:clamp(26px,4.5vw,44px);font-weight:900;line-height:1.12;margin-bottom:14px}
.hero p.sub{font-size:16px;color:#4a4560}
.hero .meta{margin-top:20px;font-size:13px;color:#6c6784;display:flex;flex-wrap:wrap;gap:16px}
.hero .meta b{color:var(--primary)}

/* sections */
section{padding:34px 0 8px}
.sec-head{display:flex;align-items:baseline;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.sec-head h2{font-size:clamp(20px,3vw,28px);font-weight:900}
.sec-tag{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)}
.lead{color:#4a4560;margin-bottom:8px;font-size:15px}
.price-note{font-size:12.5px;color:#8a86a0;margin-bottom:14px;font-style:italic}

/* tier */
.tier-head{display:flex;align-items:center;gap:12px;margin:30px 0 14px;flex-wrap:wrap}
.tier-badge{font-family:'Red Hat Display';font-weight:900;font-size:14px;letter-spacing:.06em;text-transform:uppercase;background:var(--primary);color:#fff;border-radius:8px;padding:6px 14px}
.tier-badge.solo{background:var(--secondary)}
.tier-delta{font-size:13px;font-weight:700;padding:5px 12px;border-radius:999px}
.tier-delta.pos{background:#E2F7F1;color:var(--pos)}
.tier-delta.neg{background:#FBEAE6;color:var(--neg)}
.tier-note{font-size:13px;color:#6c6784;margin:-6px 0 14px}

/* context cards */
.ctx-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px;margin-bottom:8px}
.ctx-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px}
.ctx-card .num{font-family:'Red Hat Display';font-weight:900;font-size:24px;color:var(--primary)}
.ctx-card .lbl{font-size:13px;color:#6c6784;margin-top:4px}
.note{background:#F1EDFB;border-left:4px solid var(--secondary);border-radius:0 10px 10px 0;padding:14px 16px;font-size:14px;margin-top:16px}

/* package chart */
.chart{margin-top:10px}
.bar-row{display:grid;grid-template-columns:112px minmax(200px,350px) 1fr 108px 104px 92px;gap:14px;align-items:center;padding:10px 0;border-bottom:1px dashed var(--line);font-size:13.5px}
.bar-tier{font-family:'Red Hat Display';font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;text-align:center;border-radius:8px;padding:5px 6px;background:#F1EDFB;color:var(--primary);white-space:nowrap}
.bar-tier.hi{background:var(--primary);color:#fff}
.bar-row:last-child{border-bottom:none}
.bar-row.bar-head{border-bottom:2px solid var(--line);padding:6px 0;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#6c6784;white-space:nowrap;align-items:end}
.bar-row.bar-head div:first-child{text-align:center}
.bar-models{display:block;line-height:1.35}
body.narrow .bar-row{grid-template-columns:1fr;gap:3px}
body.narrow .bar-head{display:none}
body.narrow .bar-tier{justify-self:start;padding:4px 10px}
.bar-name{font-weight:500}
.bar-track{background:var(--line);border-radius:999px;height:16px;position:relative;overflow:hidden}
.bar-fill{height:100%;border-radius:999px;background:var(--secondary)}
.bar-fill.uih{background:var(--accent)}
.bar-val{text-align:left;font-variant-numeric:tabular-nums;font-weight:500;white-space:nowrap}
.bar-delta{text-align:left;font-variant-numeric:tabular-nums;white-space:nowrap}
.bar-pct{text-align:left;font-variant-numeric:tabular-nums;font-weight:700;white-space:nowrap}
body.narrow .bar-val{text-align:left}
.delta-pos{color:var(--pos);font-weight:700}
.delta-neg{color:var(--neg);font-weight:700}
.budget-line{font-size:13px;margin:6px 0 16px;color:#6c6784}
.budget-line b{color:var(--primary)}

/* comparison tables */
.table-scroll{overflow-x:auto;border:1px solid var(--line);border-radius:14px;background:var(--card);margin-bottom:18px}
table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:520px}
th,td{padding:11px 14px;text-align:left;border-bottom:1px solid var(--line);vertical-align:top}
thead th{font-family:'Red Hat Display';font-weight:700;color:#fff;background:var(--primary);font-size:13px}
thead th.uih-col{background:var(--accent);color:var(--ink)}
tbody tr:last-child td{border-bottom:none}
td.rowlabel{font-weight:700;color:var(--primary);white-space:nowrap}
tr.price-row td{background:#F6F3FC;font-weight:700}
.vendor-model{display:block;font-weight:400;font-size:11.5px;opacity:.85}

/* pros / cons */
.pc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin-bottom:12px}
body.narrow .pc-grid{grid-template-columns:1fr}
.pc-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px}
.pc-card.uih{border:1.5px solid var(--accent)}
.pc-card h4{font-family:'Red Hat Display';font-size:15px;color:var(--primary);margin-bottom:10px}
.pc-card h4 small{display:block;font-weight:500;color:#6c6784;font-size:12px}
.pc-list{list-style:none;font-size:13px}
.pc-list li{padding:4px 0 4px 22px;position:relative}
.pc-list li.p::before{content:"+";position:absolute;left:0;top:3px;color:var(--pos);font-weight:900}
.pc-list li.c::before{content:"–";position:absolute;left:0;top:3px;color:var(--neg);font-weight:900}

/* risk */
.risk-box{background:var(--card);border:1px solid var(--line);border-left:5px solid var(--neg);border-radius:0 14px 14px 0;padding:20px 22px;margin-bottom:16px}
.risk-box h3{font-size:16px;margin-bottom:8px;color:var(--neg)}
.risk-box p{font-size:14px;color:#4a4560}
.mit-wrap{border:2px solid var(--accent);border-radius:16px;padding:18px;background:#F2FBF9;margin-top:6px}
.mit-wrap>h3{font-size:16px;color:var(--primary);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.mit-wrap>h3::before{content:"✓";flex:0 0 22px;height:22px;border-radius:50%;background:var(--accent);color:var(--ink);font-weight:900;display:flex;align-items:center;justify-content:center;font-size:13px}
.mit-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px}
.mit-card{background:#fff;border:1.5px solid var(--accent);border-radius:12px;padding:14px 16px;font-size:13.5px}
.mit-card b{display:block;color:var(--primary);margin-bottom:4px;font-family:'Red Hat Display'}

/* recommendation */
.reco{background:linear-gradient(135deg,var(--primary) 0%,#4b18ac 60%,#5a2bc0 100%);border-radius:20px;padding:34px 30px;color:#fff;margin-top:10px}
.reco h2{color:#fff;font-size:clamp(20px,3vw,28px);margin-bottom:8px}
.reco .tag{color:var(--accent);font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase}
.reco p{font-size:15px;opacity:.94;margin-top:10px}
.reco-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-top:22px}
.reco-item{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);border-radius:12px;padding:14px 16px}
.reco-item b{display:block;font-family:'Red Hat Display';font-size:15px;color:var(--accent)}
.reco-item span{font-size:12.5px;opacity:.9}
.reco .alt{margin-top:18px;font-size:13px;background:rgba(255,255,255,.08);border-radius:10px;padding:12px 14px}

/* steps */
.steps{counter-reset:st;margin-top:6px}
.step{display:flex;gap:14px;padding:12px 0;border-bottom:1px dashed var(--line);font-size:14px;align-items:flex-start}
.step::before{counter-increment:st;content:counter(st);flex:0 0 30px;height:30px;border-radius:50%;background:var(--accent);color:var(--ink);font-weight:900;font-family:'Red Hat Display';display:flex;align-items:center;justify-content:center;font-size:14px}
footer{margin-top:50px;padding-top:18px;border-top:1px solid var(--line);font-size:12px;color:#8a86a0}

/* password gate */
#gate{position:fixed;inset:0;z-index:200;background:linear-gradient(135deg,#37008D 0%,#4b18ac 60%,#5a2bc0 100%);display:flex;align-items:center;justify-content:center;padding:20px}
.gate-card{background:#fff;border-radius:20px;padding:38px 32px;max-width:380px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.35)}
.gate-card .brand{font-size:26px;margin-bottom:6px}
.gate-card h2{font-size:18px;margin-bottom:4px}
.gate-card p{font-size:13px;color:#6c6784;margin-bottom:20px}
.gate-card input{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:12px 14px;font-family:'Red Hat Text';font-size:15px;text-align:center;letter-spacing:.08em;outline:none;transition:.2s}
.gate-card input:focus{border-color:var(--secondary)}
.gate-card input.err{border-color:var(--neg);animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.gate-card button{margin-top:14px;width:100%;border:none;border-radius:12px;padding:12px;background:var(--primary);color:#fff;font-family:'Red Hat Display';font-weight:700;font-size:15px;cursor:pointer;transition:.2s}
.gate-card button:hover{background:var(--secondary)}
.gate-err{display:none;color:var(--neg);font-size:12.5px;margin-top:10px;font-weight:700}
body.locked{overflow:hidden}
@media(prefers-reduced-motion:reduce){html{scroll-behavior:auto}#app{transition:none}}

/* ── desktop presentation scale: larger everything for screen-share ── */
@media(min-width:900px){
  body:not(.force-mobile){zoom:1.18}
}

/* ── narrow layout: no horizontal scrolling anywhere ── */
body.narrow .tabbar{flex-wrap:wrap;overflow-x:visible;row-gap:6px}
body.narrow .table-scroll{overflow:visible;border:none;background:transparent}
body.narrow table{min-width:0;display:block;border-collapse:separate}
body.narrow thead{display:none}
body.narrow tbody{display:block}
body.narrow tbody tr{display:block;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 14px;margin-bottom:10px}
body.narrow tbody tr.price-row{background:#F6F3FC;border-color:var(--secondary)}
body.narrow tbody tr td{display:block;width:100%;border:none;padding:2px 0;white-space:normal}
body.narrow td.rowlabel{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--secondary);padding-bottom:6px;white-space:normal}
body.narrow td[data-v]::before{content:attr(data-v);display:block;font-weight:700;font-size:12px;color:var(--primary)}
body.narrow td[data-v]{padding:6px 0;border-top:1px dashed var(--line)}
</style>

function fmtDelta(d, lang){
  const s = (d>0?'+':'−') + Math.abs(d).toLocaleString(lang==='ro'?'ro-RO':(lang==='fr'?'fr-FR':'en-GB'));
  return d>0 ? `<span class="delta-neg">${s} €</span>` : `<span class="delta-pos">${s} €</span>`;
}
function fmtEur(n, lang){
  return n.toLocaleString(lang==='ro'?'ro-RO':(lang==='fr'?'fr-FR':'en-GB')) + ' €';
}

  const t = T[currentLang];

      <div>${t.pkgColCfg}</div>
      <div>${t.pkgColName}</div><div></div>
      <div>${t.pkgColVal}</div>
      <div>${t.pkgColDelta}</div>
      <div>${t.pkgColPct}</div>
    </div>`;
  const bars = barHead + PKG.map(p=>{
    const w = Math.round(p.total/maxTotal*100);
    const d = p.total - BUDGET;
    const pct = d/BUDGET*100;
    const pctStr = (pct>0?'+':'−') + Math.abs(pct).toLocaleString(loc,{minimumFractionDigits:1,maximumFractionDigits:1}) + '%';
    return `<div class="bar-row">
      <div class="bar-tier${p.tier==='High-end'?' hi':''}">${p.tier}</div>

  const modSections = t.modalities.map((m,i)=>{

    return `<section id="mod${i}">

      <span class="eyebrow">${t.eyebrow}</span>
      <h1>${t.title}</h1>
      <p class="sub">${t.sub}</p>
      <div class="meta"><span><b>${t.meta1}</b></span><span>${t.meta2}</span><span>${t.meta3}</span></div>
    </div>
    <section>
      <div class="sec-head"><span class="sec-tag">${t.ctxTag}</span><h2>${t.ctxTitle}</h2></div>
      <p class="lead">${t.ctxLead}</p>
      <div class="ctx-grid">${t.ctxCards.map(c=>`<div class="ctx-card"><div class="num">${c[0]}</div><div class="lbl">${c[1]}</div></div>`).join('')}</div>
      <div class="note">${t.ctxNote}</div>
    </section>`,

    `<section>
      <div class="sec-head"><span class="sec-tag">${t.pkgTag}</span><h2>${t.pkgTitle}</h2></div>
      <p class="lead">${t.pkgLead}</p>
      <p class="price-note">${t.pkgNote}</p>
      <p class="budget-line">${t.budgetLbl} <b>${fmtEur(BUDGET,currentLang)}</b> · ${t.deltaLbl} ↓</p>
      <div class="chart">${bars}</div>
    </section>`,

    modSections[0],
    modSections[1],
    modSections[2],
    modSections[3],

    `<section>
      <div class="sec-head"><span class="sec-tag">${t.riskTag}</span><h2>${t.riskTitle}</h2></div>
      <div class="risk-box"><h3>${t.riskHead}</h3><p>${t.riskBody}</p></div>
      <div class="mit-wrap">
        <h3>${t.mitTitle}</h3>
        <div class="mit-grid">${t.mits.map(m=>`<div class="mit-card"><b>${m[0]}</b>${m[1]}</div>`).join('')}</div>
      </div>
    </section>`,

    `<section>
      <div class="reco">
        <span class="tag">${t.recoTag}</span>
        <h2>${t.recoTitle}</h2>
        <p>${t.recoBody}</p>
        <div class="reco-grid">${t.recoItems.map(r=>`<div class="reco-item"><b>${r[0]}</b><span>${r[1]}</span></div>`).join('')}</div>
        <div class="alt">${t.recoAlt}</div>
      </div>
    </section>
    <section>
      <div class="sec-head"><span class="sec-tag">${t.stepsTag}</span><h2>${t.stepsTitle}</h2></div>
      <div class="steps">${t.steps.map(s=>`<div class="step"><div>${s}</div></div>`).join('')}</div>
    </section>`
  ];

  const tabBar = `<div class="tabbar" role="tablist">${t.tabs.map((tb,i)=>`<button class="tab${i===currentTab?' active':''}" role="tab" aria-selected="${i===currentTab}" onclick="setTab(${i})">${tb}</button>`).join('')}</div>`;

  document.getElementById('app').innerHTML =
    tabBar +
    panels.map((p,i)=>`<div class="tab-panel${i===currentTab?' active':''}" role="tabpanel">${p}</div>`).join('') +
    `<footer>${t.footer}</footer>`;

  document.querySelectorAll('.lang-switch button').forEach(b=>{
    b.classList.toggle('active', b.dataset.lang===currentLang);
  });
  document.getElementById('vtLabel').textContent = mobileView ? T[currentLang].vtDesk : T[currentLang].vtMob;
  document.documentElement.lang = currentLang;
}

function setLang(l){ currentLang = l; render(); }
function setTab(i){
  currentTab = i;
  document.querySelectorAll('.tab').forEach((b,bi)=>{ b.classList.toggle('active', bi===i); b.setAttribute('aria-selected', bi===i); });
  document.querySelectorAll('.tab-panel').forEach((p,pi)=>p.classList.toggle('active', pi===i));
  window.scrollTo({top:0, behavior:'auto'});
}
function unlock(){
  const inp = document.getElementById('gatePass');
  if(inp.value === 'Medima2027'){
    document.getElementById('gate').style.display = 'none';
    document.body.classList.remove('locked');
  } else {
    inp.classList.remove('err'); void inp.offsetWidth; inp.classList.add('err');
    document.getElementById('gateErr').style.display = 'block';
    inp.select();
  }
}
function updNarrow(){
  document.body.classList.toggle('narrow', mobileView || window.innerWidth <= 640);
}
window.addEventListener('resize', updNarrow);

function toggleView(){
  mobileView = !mobileView;
  document.body.classList.toggle('force-mobile', mobileView);
  document.getElementById('viewToggle').classList.toggle('on', mobileView);
  document.getElementById('vtLabel').textContent = mobileView ? T[currentLang].vtDesk : T[currentLang].vtMob;
  updNarrow();
}

render();
updNarrow();
</script>
</body>
</html>
